# example.yaml — Reference workflow for megalos.
#
# Minimal, NOT a production workflow. Production workflows live in their
# own domain repositories (see README.md). For schema reference see SCHEMA.md.
# Validate: python -m megalos_server.validate megalos_server/workflows/example.yaml

name: example
description: Minimal reference workflow demonstrating the megalos YAML schema.
category: example
output_format: text

steps:
  - id: clarify
    title: Clarify the Request
    directive_template: >-
      Ask the user what they want to accomplish. Do not assume — let the user
      state their goal in their own words before proceeding.
    gates:
      - User has stated a concrete goal
    anti_patterns:
      - Guessing the goal from prior context

  - id: respond
    title: Provide a Response
    directive_template: >-
      Using the clarified goal, produce a short, direct response that addresses
      it. Keep it concise; this is a reference workflow, not a real product.
    gates:
      - Response directly addresses the stated goal
    anti_patterns:
      - Padding the response with unnecessary detail

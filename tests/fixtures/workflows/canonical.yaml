# canonical.yaml — Framework test fixture (NOT a production workflow).
#
# Three neutral steps (alpha, bravo, charlie) — minimum to verify ordering,
# mid-revision, and completion. Neutral IDs prevent confusion with real
# workflows. Loaded into WORKFLOWS via tests/conftest.py at import time.

name: canonical
description: Synthetic 3-step framework test fixture (not a production workflow).
category: test
output_format: structured_code

steps:
  - id: alpha
    title: Alpha
    directive_template: First step. Do NOT skip ahead. Stub directive for tests.
    gates: [done]
    anti_patterns: [skipping]
  - id: bravo
    title: Bravo
    directive_template: Middle step. Do NOT skip ahead. Stub directive for tests.
    gates: [done]
    anti_patterns: [skipping]
  - id: charlie
    title: Charlie
    directive_template: Final step. Do NOT skip ahead. Stub directive for tests.
    gates: [done]
    anti_patterns: [skipping]

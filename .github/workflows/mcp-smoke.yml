# Manual-dispatch-only advisory live-smoke for the deployed MCP stub.
#   - Scheduled trigger removed: Horizon free-tier org-auth is mandatory
#     (per .megalos/DECISIONS.md 2026-04-14 "Fork B"), so the stub endpoint
#     returns 401 to headless CI and the nightly cron was signalling nothing
#     but the known-constant auth state. Re-enable the schedule if/when the
#     Horizon plan permits disabling org-auth.
#   - NOT a required check. Manual dispatch available for post-change checks.
#   - MCP_STUB_URL injected from the GitHub secret of the same name;
#     operator sets the secret after the one-click Horizon deploy.

name: mcp-smoke

on:
  workflow_dispatch:

jobs:
  mcp-smoke:
    name: mcp-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: 'pyproject.toml'
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: uv sync
        run: uv sync --extra panel
      - name: Run live smoke
        env:
          MCP_STUB_URL: ${{ secrets.MCP_STUB_URL }}
        run: uv run python ci/mcp_smoke.py
